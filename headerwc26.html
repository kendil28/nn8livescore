<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FIFA World Cup 2026 Header</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#131316",
            "surface-container-high": "#2a2a2d",
            "surface-container": "#1f1f22",
            "on-surface": "#e4e1e5",
            "on-surface-variant": "#c5c5d9",
            "text-secondary": "#98989E",
            "outline": "#8f8fa2",
            "outline-variant": "#444656",
          },
          fontFamily: {
            sans: ["Hanken Grotesk", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Hanken Grotesk', sans-serif;
    }
    .header-container {
      background-color: #060606;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
    }
    /* Precise background glow effect based on IMAGE_15 */
    .glow-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 10% 100%, rgba(220, 38, 38, 0.45) 0%, transparent 45%),
                  radial-gradient(circle at 45% 100%, rgba(20, 83, 45, 0.45) 0%, transparent 50%),
                  radial-gradient(circle at 70% 100%, rgba(30, 58, 138, 0.4) 0%, transparent 45%),
                  radial-gradient(circle at 85% 90%, rgba(133, 77, 14, 0.4) 0%, transparent 40%),
                  radial-gradient(circle at 95% 100%, rgba(88, 28, 135, 0.35) 0%, transparent 35%);
      filter: blur(50px);
      pointer-events: none;
      z-index: 1;
    }
    .content-wrapper {
      position: relative;
      z-index: 10;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Custom scrollbar styling */
    .overflow-x-auto::-webkit-scrollbar {
      height: 6px;
    }
    .overflow-x-auto::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }
    .overflow-x-auto::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 2px;
    }
    .overflow-x-auto::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.6);
    }
    .timeline-dot {
      width: 8px;
      height: 8px;
      background-color: white;
      border-radius: 50%;
      position: relative;
    }
    .timeline-dot.active {
      box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body class="bg-[#0e0e11] p-4 flex justify-center items-start min-h-screen">
<!-- Main Header -->
<header class="header-container w-full max-w-[1026px] text-white shadow-2xl p-4 md:p-6" data-purpose="fifa-header">
<div class="glow-overlay"></div>
<div class="content-wrapper flex flex-col gap-6">
<!-- Top Branding & Favourite Row -->
<div class="flex items-start justify-between">
<div class="flex items-start gap-4 md:gap-8">
<!-- FIFA Trophy Image -->
<div class="flex-shrink-0 w-[50px] md:w-[60px]">
<img alt="FIFA Trophy" class="h-16 md:h-24 w-auto object-contain" src="worldcup.png"/>
</div>
<div class="flex flex-col gap-3">
<div class="flex flex-col md:flex-row md:items-baseline gap-2 md:gap-4">
<h1 class="text-2xl md:text-[32px] font-bold tracking-tight">FIFA World Cup 2026</h1>
<span class="text-[#98989E] text-sm font-medium">755k followers</span>
</div>
<!-- Year Selector -->
<div class="relative flex items-start max-w-[calc(100vw-120px)] md:max-w-[1100px]">
<div class="flex-1 relative">
<div class="flex overflow-x-auto space-x-2 py-1 pr-12 pb-5 no-scrollbar" id="year-selector-container">
<!-- Active Year -->
<button class="bg-white text-black px-4 py-1.5 rounded-full text-sm font-bold flex-shrink-0">2026</button>
<!-- Inactive Years -->
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">2022</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">2018</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">2014</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">2010</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">2006</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">2002</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1998</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1994</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1990</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1986</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1982</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1978</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1974</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1970</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1966</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1962</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1958</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1954</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1950</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1938</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1934</button>
<button class="bg-[#1f1f22]/80 hover:bg-[#2a2a2d] text-[#e4e1e5] px-4 py-1.5 rounded-full text-sm font-medium flex-shrink-0">1930</button>
</div>
<!-- Custom Scrollbar -->
<div class="custom-scrollbar-track absolute bottom-0 left-0 right-0 h-2 bg-white/10 rounded-full cursor-pointer" id="custom-scrollbar-track">
<div class="custom-scrollbar-thumb absolute h-full bg-white/40 rounded-full cursor-grab active:cursor-grabbing hover:bg-white/60 transition-colors" id="custom-scrollbar-thumb" style="width: 30px;"></div>
</div>
</div>
<!-- Scroll Arrow -->
<button class="absolute right-0 bg-white text-black h-8 w-8 flex items-center justify-center rounded-lg shadow-lg">
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
</div>
</div>
<!-- Favourite Button -->
<button class="flex-shrink-0 bg-white text-black px-3 py-2 rounded-md flex items-center gap-2 font-bold text-[13px] tracking-wide transition hover:bg-gray-100 uppercase">
<span class="material-symbols-outlined text-[18px]">star</span>
<span class="hidden sm:inline">Favourite</span>
</button>
</div>
<!-- Tournament Progress Timeline -->
<div class="mt-4 md:mt-8 px-1" data-purpose="tournament-timeline">
<div class="relative h-px bg-white/20 w-full mb-3">
<div class="absolute top-1/2 left-0 right-0 h-[1.5px] bg-white/20 -translate-y-1/2"></div>
<div class="relative flex justify-between items-center -translate-y-1/2">
<!-- Group Stage -->
<div class="flex flex-col items-center">
<div class="timeline-dot active"></div>
</div>
<!-- R32 -->
<div class="flex flex-col items-center">
<div class="timeline-dot"></div>
</div>
<!-- R16 -->
<div class="flex flex-col items-center">
<div class="timeline-dot"></div>
</div>
<!-- QF -->
<div class="flex flex-col items-center">
<div class="timeline-dot"></div>
</div>
<!-- SF -->
<div class="flex flex-col items-center">
<div class="timeline-dot"></div>
</div>
<!-- 3rd -->
<div class="flex flex-col items-center">
<div class="timeline-dot"></div>
</div>
<!-- Final -->
<div class="flex flex-col items-center">
<div class="timeline-dot"></div>
</div>
</div>
</div>
<!-- Stage Labels -->
<div class="flex justify-between text-[11px] md:text-[13px] font-bold text-white uppercase">
<div class="w-1/7">Group stage</div>
<div class="w-1/7 text-center translate-x-[15%]">R32</div>
<div class="w-1/7 text-center translate-x-[20%]">R16</div>
<div class="w-1/7 text-center translate-x-[25%]">QF</div>
<div class="w-1/7 text-center translate-x-[30%]">SF</div>
<div class="w-1/7 text-center translate-x-[15%]">3rd</div>
<div class="w-1/7 text-right">Final</div>
</div>
</div>
</div>
</header>
<script>
// Custom Scrollbar Functionality
const container = document.getElementById('year-selector-container');
const track = document.getElementById('custom-scrollbar-track');
const thumb = document.getElementById('custom-scrollbar-thumb');

let isDragging = false;
let startX;
let scrollLeft;

// Update thumb position based on scroll
function updateThumbPosition() {
    const scrollRatio = container.scrollLeft / (container.scrollWidth - container.clientWidth);
    const trackWidth = track.clientWidth;
    const thumbWidth = thumb.clientWidth;
    const maxThumbPosition = trackWidth - thumbWidth;
    const thumbPosition = scrollRatio * maxThumbPosition;
    thumb.style.left = thumbPosition + 'px';
}

// Initial update
container.addEventListener('load', updateThumbPosition);
window.addEventListener('load', updateThumbPosition);
container.addEventListener('scroll', updateThumbPosition);
window.addEventListener('resize', updateThumbPosition);

// Drag functionality
thumb.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.pageX - thumb.offsetLeft;
    scrollLeft = container.scrollLeft;
    thumb.classList.add('active:cursor-grabbing');
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.pageX - track.getBoundingClientRect().left;
    const trackWidth = track.clientWidth;
    const thumbWidth = thumb.clientWidth;
    const maxThumbPosition = trackWidth - thumbWidth;
    let thumbPosition = x - startX;
    
    // Clamp thumb position
    if (thumbPosition < 0) thumbPosition = 0;
    if (thumbPosition > maxThumbPosition) thumbPosition = maxThumbPosition;
    
    thumb.style.left = thumbPosition + 'px';
    
    // Update scroll position
    const scrollRatio = thumbPosition / maxThumbPosition;
    container.scrollLeft = scrollRatio * (container.scrollWidth - container.clientWidth);
});

document.addEventListener('mouseup', () => {
    isDragging = false;
    thumb.classList.remove('active:cursor-grabbing');
});

// Track click to jump
track.addEventListener('click', (e) => {
    if (e.target === thumb) return;
    const x = e.pageX - track.getBoundingClientRect().left;
    const trackWidth = track.clientWidth;
    const thumbWidth = thumb.clientWidth;
    const maxThumbPosition = trackWidth - thumbWidth;
    const thumbPosition = x - (thumbWidth / 2);
    
    // Clamp thumb position
    let clampedPosition = thumbPosition;
    if (clampedPosition < 0) clampedPosition = 0;
    if (clampedPosition > maxThumbPosition) clampedPosition = maxThumbPosition;
    
    thumb.style.left = clampedPosition + 'px';
    
    // Update scroll position
    const scrollRatio = clampedPosition / maxThumbPosition;
    container.scrollLeft = scrollRatio * (container.scrollWidth - container.clientWidth);
});
</script>
</body></html>
